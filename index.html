<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCORIX — School Marks System v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--s1:#181c27;--s2:#1f2436;--s3:#252b3d;
  --bd:#2e3550;--ink:#e8ecf5;--ink2:#9aa3bf;--ink3:#5a6380;
  --gold:#f0b429;--red:#e05252;--green:#3ecf8e;--blue:#4a8fff;--purple:#9f7aea;
}
body.light{
  --bg:#f0f2f7;--s1:#ffffff;--s2:#f5f7fc;--s3:#eaecf4;
  --bd:#d0d5e8;--ink:#1a1d2e;--ink2:#4a5070;--ink3:#8890b0;
  --gold:#d09010;--red:#c0392b;--green:#1a7a4a;--blue:#2563eb;--purple:#7c3aed;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
/* Animations */
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
/* Sidebar & Layout */
#appWrap{display:none;flex-direction:column;height:100vh;}
.topbar{height:54px;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 1.4rem;position:sticky;top:0;z-index:100;}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:215px;background:var(--s1);border-right:1px solid var(--bd);padding:1rem 0;overflow-y:auto;flex-shrink:0;}
.main{flex:1;overflow-y:auto;padding:1.6rem;background:var(--bg);}
.navbtn{display:flex;align-items:center;gap:9px;width:100%;padding:10px 1.1rem;background:none;border:none;color:var(--ink2);cursor:pointer;text-align:left;transition:all .12s;}
.navbtn.active{color:var(--gold);border-left:3px solid var(--gold);font-weight:600;}
/* Cards & Tables */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:1.3rem;margin-bottom:.9rem;}
table{width:100%;border-collapse:collapse;font-size:.85rem;}
th{padding:9px;text-align:left;color:var(--ink3);border-bottom:1px solid var(--bd);font-size:.65rem;text-transform:uppercase;}
td{padding:9px;border-bottom:1px solid rgba(46,53,80,.4);vertical-align:middle;}
.mkin{width:65px;padding:5px;background:var(--s3);border:1px solid var(--bd);border-radius:5px;color:var(--ink);text-align:center;}
/* Print Styling */
.proclamation-table{width:100%; border-collapse:collapse; background:white; color:black;}
.proclamation-table th, .proclamation-table td{border:1px solid #333; padding:8px; text-align:center;}
@media print{
  body > *:not(#print-area){display:none!important;}
  #print-area{display:block!important; width:100%!important;}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
</head>
<body>
<div id="print-area" style="display:none;"></div>
<div id="loginWrap">
    <div class="lbox">
        <h1 class="llogo">SC<span>ORIX</span></h1>
        <div class="lf"><label>Email</label><input type="email" id="uEmail"></div>
        <div class="lf"><label>Password</label><input type="password" id="uPass"></div>
        <button class="lbtn" onclick="handleLogin()">Sign In</button>
    </div>
</div>
<div id="appWrap">
    <div class="topbar">
        <div class="tlogo">SC<span>ORIX</span> <small id="activeSchoolName"></small></div>
        <div style="display:flex; gap:12px;">
            <input type="text" id="acYear" value="2025-2026" style="background:var(--s2);color:var(--ink);border:1px solid var(--bd);width:100px;text-align:center;border-radius:4px;">
            <button class="tbtn" onclick="logout()">Logout</button>
        </div>
    </div>
    <div class="layout">
        <div class="sidebar" id="sidebarNav">
            <button class="navbtn active" onclick="sp('pDash')">Dashboard</button>
            <button class="navbtn" onclick="sp('pMarks')">Enter Marks</button>
            <button class="navbtn" onclick="sp('pReports')">Report Cards</button>
            <button class="navbtn" onclick="sp('pProclamation')">Proclamation</button>
        </div>
        <div class="main">
            <div id="pDash" class="page on"><h2>Dashboard</h2></div>
            <div id="pMarks" class="page">
                <div class="srow">
                    <select id="selClass" onchange="loadStudents()"></select>
                    <select id="selSubject" onchange="loadMarks()"></select>
                </div>
                <div class="card"><table id="marksTable"><tbody></tbody></table></div>
            </div><script>
// --- STATE ---
let _state = {
    user: null,
    school: null,
    students: [],
    subjects: [],
    marks: [],
    classes: []
};

// --- INITIALIZE SUPABASE ---
// Note: You must fill these in from your Supabase settings
const _supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');

// --- PAGE NAVIGATION ---
function sp(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.getElementById(pageId).classList.add('on');
    document.querySelectorAll('.navbtn').forEach(b => b.classList.remove('active'));
    // Set active button logic...
}

// --- DYNAMIC TITLES ---
function getReportTitle() {
    const term = document.getElementById('selTerm')?.value || "1";
    const type = document.getElementById('selExamType')?.value || "ET";
    // EU = Unit/Midterm, ET = End of Term
    return type === 'EU' ? `MIDTERM TERM ${term} REPORT CARD` : `END OF TERM ${term} REPORT CARD`;
}

// --- RANKING & SORTING LOGIC ---
function calculateStudentTotal(studentId) {
    let total = 0;
    _state.subjects.forEach(sub => {
        let m = _state.marks.find(x => x.student_id === studentId && x.subject_id === sub.id);
        total += m ? parseFloat(m.score) : 0;
    });
    return total;
}

function getRankedStudents() {
    let list = _state.students.map(st => {
        return { ...st, totalMarks: calculateStudentTotal(st.id) };
    });
    // Sort descending: Highest marks at the top
    return list.sort((a, b) => b.totalMarks - a.totalMarks);
}

// --- DATA LOADING ---
async function loadStudents() {
    const classId = document.getElementById('selClass').value;
    const { data, error } = await _supabase.from('students').select('*').eq('class_id', classId);
    if (!error) _state.students = data;
    renderStudentList();
}// --- REPORT GENERATION ---
function generateProclamation() {
    const ranked = getRankedStudents();
    const subjects = _state.subjects;
    const title = getReportTitle().replace("REPORT CARD", "PROCLAMATION LIST");

    let html = `
    <div class="rpaper">
        <h2 style="text-align:center; margin-bottom:10px;">${title}</h2>
        <table class="proclamation-table">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th style="text-align:left;">Student Name</th>
                    ${subjects.map(s => `<th>${s.name}</th>`).join('')}
                    <th>Total</th>
                    <th>Avg %</th>
                </tr>
            </thead>
            <tbody>
                ${ranked.map((st, index) => {
                    let maxMarks = subjects.length * 100; // Assume 100 per subject
                    let avg = ((st.totalMarks / maxMarks) * 100).toFixed(1);
                    return `
                    <tr>
                        <td>${index + 1}</td>
                        <td style="text-align:left;">${st.full_name}</td>
                        ${subjects.map(sub => {
                            let m = _state.marks.find(x => x.student_id === st.id && x.subject_id === sub.id);
                            return `<td>${m ? m.score : 0}</td>`;
                        }).join('')}
                        <td><b>${st.totalMarks}</b></td>
                        <td><b>${avg}%</b></td>
                    </tr>`;
                }).join('')}
            </tbody>
        </table>
    </div>`;
    document.getElementById('procOut').innerHTML = html;
}

// --- PRINT ENGINE ---
function printReport() {
    const procDiv = document.getElementById('procOut');
    const rpDiv = document.getElementById('rpOut');
    const content = procDiv.innerHTML || rpDiv.innerHTML;
    
    if (!content) return alert("Generate data first!");

    const printArea = document.getElementById('print-area');
    printArea.innerHTML = content;
    printArea.style.display = 'block';

    setTimeout(() => {
        window.print();
        printArea.style.display = 'none';
        printArea.innerHTML = '';
    }, 500);
}

// Theme Toggle
function toggleTheme() { document.body.classList.toggle('light'); }

// Run login check on load
window.onload = () => { /* Check session logic */ };
</script>
</body>
</html>
